name: NCS Results Sync

# Pulls the NCS schedule/results every ~10 min during the tournament window
# and commits data/schedule.json when anything changes. GitHub Pages then
# serves the fresh file, and the dashboard auto-loads it.

on:
  workflow_dispatch:        # manual "Run workflow" button any time
  schedule:
    # GitHub cron is UTC. Central (CDT) = UTC-5.
    # Covers Sat & Sun ~8:00 AM–8:00 PM CT (13:00–01:00 UTC).
    - cron: "*/10 13-23 * * 6,0"
    - cron: "*/10 0-1   * * 0,1"

permissions:
  contents: write           # allow the action to commit the JSON

concurrency:
  group: ncs-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scraper/requirements.txt

      - name: Scrape NCS
        run: python scraper/ncs_scrape.py

      - name: Commit if changed
        run: |
          git config user.name  "ncs-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/schedule.json)" ]]; then
            git add data/schedule.json
            git commit -m "NCS sync: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed updated results."
          else
            echo "No change."
          fi
