<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primetime NCS Dashboard</title>
  <meta name="theme-color" content="#080808">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050505;color:#fff8e6;font-family:Arial,Helvetica,sans-serif}
    body{display:flex;flex-direction:column}
    .pt-shell{background:radial-gradient(circle at 12% 0%,rgba(212,160,23,.18),transparent 30%),linear-gradient(180deg,#111,#050505);border-bottom:3px solid #d4a017;box-shadow:0 18px 44px rgba(0,0,0,.35);padding:14px 18px;position:sticky;top:0;z-index:20}
    .pt-head{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .pt-brand{display:flex;align-items:center;gap:14px;min-width:0}
    .pt-logo{width:82px;height:52px;object-fit:contain;filter:drop-shadow(0 8px 22px rgba(212,160,23,.45))}
    .pt-title{min-width:0}.pt-title strong{display:block;font-size:18px;letter-spacing:.5px;text-transform:uppercase}.pt-title span{display:block;color:rgba(255,248,230,.62);font-size:12px;margin-top:2px}
    .pt-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pt-btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:8px;border:1px solid rgba(212,160,23,.45);color:#111;background:#d4a017;text-decoration:none;font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
    .pt-btn.alt{background:transparent;color:#d4a017}
    .pt-frame-wrap{flex:1;min-height:0}.pt-frame{display:block;width:100%;height:calc(100vh - 84px);border:0;background:#0c0f16}
    @media(max-width:700px){.pt-head{align-items:flex-start;flex-direction:column}.pt-logo{width:72px;height:46px}.pt-frame{height:calc(100vh - 150px)}}
  </style>
</head>
<body>
  <header class="pt-shell">
    <div class="pt-head">
      <div class="pt-brand">
        <img class="pt-logo" src="../assets/primetime-logo.svg" alt="Primetime Fastpitch logo">
        <div class="pt-title"><strong>Primetime NCS Dashboard</strong><span>Tournament scores · standings · game-day command center</span></div>
      </div>
      <nav class="pt-actions">
        <a class="pt-btn alt" href="../index.html#home">Home</a>
        <a class="pt-btn alt" href="../roster/">Roster</a>
        <a class="pt-btn" href="dashboard.html">Open Full Dashboard</a>
      </nav>
    </div>
  </header>
  <main class="pt-frame-wrap">
    <iframe class="pt-frame" src="dashboard.html" title="Primetime NCS tournament dashboard"></iframe>
  </main>
</body>
</html>
